services:
  autotask-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: autotask-mcp
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - MCP_TRANSPORT=http
      - MCP_HTTP_PORT=8080
      - MCP_HTTP_HOST=0.0.0.0
      - AUTH_MODE=${AUTH_MODE:-env}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
